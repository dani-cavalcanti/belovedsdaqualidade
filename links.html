<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Página com links compartilhados por Dani Cavalcanti"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- FIM GOOGLE FONTS -->
    <!-- BOOTSTRAP ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- FIM BOOTSTRAP ICONS -->
    <title>Links e Tals</title>
  </head>
  <body>
    <div id="menu-container"></div>

    <div class="wrapper">
      <main class="content">
        <section class="link">
          <div class="interface">
            <div class="flex">
              <div class="links">
                <h1>Em contrução!!</h1>
              </div>
              <div class="img-link">
                <img src="img/link.png" alt="Portfolio" />
              </div>
            </div>
          </div>
        </section>
      </main>
      <footer class="rodape">
        <div class="contatos">
          <a
            href="mailto:qadanicavalcanti@gmail.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="./img/email.png" alt="Ícone de e-mail" />
          </a>
          <a
            href="https://www.linkedin.com/in/dani-cavalcanti-qa"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="./img/linkedin.svg" alt="Ícone do LinkedIn" />
          </a>
          <a
            href="https://www.youtube.com/@qadanicavalcanti"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="./img/youtube.svg" alt="Ícone do YouTube" />
          </a>
          <a
            href="https://www.instagram.com/qadanicavalcanti"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img src="./img/instagram.png" alt="Ícone do Instagram" />
          </a>
        </div>
        <p>&copy; 2024 QA Dani Cavalcanti</p>
      </footer>
    </div>
    <script>
      // Carregar o menu.html no container
      fetch("menu.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("menu-container").innerHTML = data;
        })
        .catch((error) => console.error("Erro ao carregar o menu:", error));
    </script>
  </body>
</html>
